<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BenMark - Iniciar Sesión</title>
    <link rel="stylesheet" href="../css/login.css">
    <!-- Logger debe cargarse PRIMERO para estar disponible en otros scripts -->
    <script src="../js/logger.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/notifications.js"></script>
    <style>
        /* Estilos para el contenedor del campo de contraseña */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        /* Aseguramos que el input ocupe todo el ancho disponible */
        .password-wrapper input {
            width: 100%;
            padding-right: 45px;
            /* Dejar espacio para el botón */
        }

        /* Estilos para el botón de mostrar/ocultar */
        .toggle-password {
            position: absolute;
            right: 1px;
            /* Posicionarlo a la derecha dentro del campo */
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            /* Tamaño del ícono */
            padding: 10px;
            color: #555;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <form id="loginForm">
            <img src="../images/logo-benmarket.jpg" alt="BenMarket" class="login-logo">
            <p>Inicia sesión para continuar</p>
            <div class="form-grupo">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Ingrese su nombre de usuario" required
                    autocomplete="username">
            </div>
            <div class="form-grupo">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required>
                    <button type="button" id="togglePassword" class="toggle-password">👁️</button>
                </div>
            </div>
            <div class="form-grupo" id="caja-login-container">
                <label for="cajaLogin">Seleccionar Caja</label>
                <select id="cajaLogin" name="cajaLogin" required>
                    <option value="" disabled selected>-- Elija una caja --</option>
                    <option value="Caja 1">Caja 1</option>
                    <option value="Caja 2">Caja 2</option>
                    <option value="Caja 3">Caja 3</option>
                    <option value="Tesoreria">Tesoreria</option>
                </select>
            </div>
            <button type="submit" class="btn-login">Ingresar</button>
            <p id="error-message" class="error-message"></p>
        </form>
    </div>
    <script src="../js/login.js"></script>
</body>

</html>
